<div class="ui-g dashboard">

  <div class="ui-g-12">
    <div class="p-card">
      <span class="p-card-titulo">Mailer</span>
    </div>
  </div>

  <div class="ui-g-12">

    <div class="p-card">
      <div class="ui-g">
        <div class="ui-g-12">
          <div class="ui-g-1 font-weight-bold p-0">Para</div>
          <div class="ui-g-11 p-0 ui-fluid">
            <p-autoComplete
              [(ngModel)]="email.to"
              [multiple]="true"
              [suggestions]="usuariosEncontrados"
              (completeMethod)="getListaUsuarios($event)"
              field="nome" placeholder="Usuários" [minLength]="1" [dropdown]="true" >
            </p-autoComplete>
          </div>
        </div>
        <div class="ui-g-12">
          <div class="ui-g-1 font-weight-bold p-0">Assunto</div>
          <div class="ui-g-11 p-0">
            <input class="w-100" type="text" pInputText [(ngModel)]="email.subject"/>
          </div>
        </div>
        <div class="ui-g-12">
          <p-editor [(ngModel)]="email.content" [style]="{'height':'320px'}"></p-editor>
        </div>

        <div class="ui-g-12 text-center">
          <button class="w-25" pButton type="submit" icon="fa fa-paper-plane" label="Enviar" (click)="enviarEmail()"></button>
        </div>
      </div>
    </div>
  </div>

  <div class="ui-g-12" *ngIf="buscaFalha">
    <app-mensagem-erro></app-mensagem-erro>
  </div>
</div>
