<div class="topbar">
    <a routerLink="/" class="topbar-logo">
        <img [attr.src]="'../../assets/layout/images/logo_topbar_branco.png'">
    </a>

    <a *ngIf="utils.isMobile()" href="#" id="menu-button" (click)="app.onMenuButtonClick($event)">
        <i class="fa fa-bars"></i>
    </a>

    <a href="#" id="user-display" (click)="app.onTopbarMenuButtonClick($event)" style="margin-top: 15px;">
        <span class="username">{{nome}}</span>
        <i class="fa fa-user-circle username" style="margin-right: 6px; font-size: 23px"></i>
        <!--<img src="assets/layout/images/avatar.png" style="border: 0px;">-->
        <i class="fa fa-angle-down username" aria-hidden="true"></i>
    </a>

    <ul id="topbar-menu" class="fadeInDown" [ngClass]="{'topbar-menu-visible': app.topbarMenuActive}" (click)="app.onTopbarMenuClick($event)">

        <li #settings [ngClass]="{'menuitem-active':app.activeTopbarItem === settings}" (click)="app.onTopbarItemClick($event, settings)">
            <a href="#">
                <i class="pi pi-cog"></i>
                <span>Configuração</span>
            </a>
            <ul>
                <li role="menuitem">
                    <a href="#" (click)="onMenuSlim()">
                        <i class="pi pi-user"></i>
                        <span>Menu Slim</span>
                    </a>
                </li>
                <li role="menuitem">
                    <a href="#" (click)="onMenuStatic()">
                        <i class="fa fa-user-secret"></i>
                        <span>Menu Static</span>
                    </a>
                </li>
                <li role="menuitem">
                    <a href="#" (click)="onMenuLight()">
                        <i class="fa fa-user-secret"></i>
                        <span>Menu Claro</span>
                    </a>
                </li>
                <li role="menuitem">
                    <a href="#" (click)="onMenuDark()">
                        <i class="fa fa-user-secret"></i>
                        <span>Menu Escuro</span>
                    </a>
                </li>
            </ul>
            <a href="#" (click)="onLogout()">
                <i class="topbar-icon fa fa-sign-out"></i>
                <span class="topbar-item-name">Logout</span>
            </a>
        </li>

    </ul>


</div>
