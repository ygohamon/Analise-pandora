<p-dialog
    *ngIf="mostraFotoAmpliada"
    header="Foto"
    [modal]="true"
    [style]="utils.getDialogStyle()"
    [(visible)]="mostraFotoAmpliada">

    <div class="ui-g" style="margin-bottom: 100px">
      <div class="ui-g-12">
          <img src="data:image/png;base64,{{imagemAmpliada}}" style="width: 100%;">
      </div>
    </div>

    <p-footer>
      <div class="ui-dialog-buttonpane ui-helper-clearfix">
        <button type="button" pButton icon="pi pi-times" (click)="mostraFotoAmpliada=false" label="Fechar"></button>
      </div>
    </p-footer>
</p-dialog>


<div class="ui-g">
  <div class="ui-g-12">
    <p-carousel [value]="fotos">
      <p-header>
        <h3>Fotos</h3>
      </p-header>

      <ng-template let-foto pTemplate="item">
        <div [class.ui-g]="utils.isMobile()">
          <div class="ui-g-12">
              <div class="ui-g-4 ui-sm-12"></div>
              <div class="ui-g-4 ui-sm-12 text-center">
                  <img class="pointer" (click)="ampliaImagem(foto.img)" [src]="sanitize(foto.img)" style="width: 70%; min-width:80px">
              </div>
              <div class="ui-g-4 ui-sm-12"></div>
          </div>
        </div>
      </ng-template>
    </p-carousel>
  </div>
</div>
